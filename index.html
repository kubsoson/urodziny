<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urodzinki Kini</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --gold: #d4af37;
            --text: #ffffff;
            --soft-white: #e0e0e0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .background-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            z-index: -1;
        }

        .content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 0 30px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 4rem);
            color: var(--gold);
            margin-bottom: 10px;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeInUp 1.5s forwards;
        }

        .divider {
            width: 80px;
            height: 1px;
            background: var(--gold);
            margin: 20px 0;
            opacity: 0;
            animation: fadeIn 2s forwards 0.5s;
        }

        .wishes-text {
            font-size: 1.2rem;
            line-height: 1.8;
            max-width: 700px;
            color: var(--soft-white);
            font-weight: 200;
            opacity: 0;
            animation: fadeIn 2s forwards 1s;
        }

        .highlight {
            color: var(--gold);
            font-weight: 400;
        }

        .btn-video {
            margin-top: 40px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px 35px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            opacity: 0;
            animation: fadeIn 2s forwards 1.5s;
        }

        .btn-video:hover {
            background: var(--gold);
            color: var(--bg);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        /* Modal Wideo dla pliku lokalnego */
        #video-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        video {
            width: 90%;
            max-width: 850px;
            outline: none;
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .close-btn {
            margin-top: 25px;
            color: var(--gold);
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .close-btn:hover {
            letter-spacing: 4px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="content">
        <h1>Kinia, Wszystkiego Najlepszego!</h1>
        <div class="divider"></div>
        
        <p class="wishes-text">
            Życzę Ci wszystkiego co najlepsze: <br>
            dużo miłości, pieniędzy, lepszego auta w przyszłości, <br>
            mnóstwa cierpliwości <span style="font-style: italic;">(szczególnie do mnie...)</span> <br>
            i spełnienia wszystkich marzeń, które sobie wymarzysz.
        </p>

        <button class="btn-video" onclick="openVideo()">Kliknij :3 </button>
    </div>

    <div id="video-modal">
        <video id="myVideo" controls>
            <source src="1.mp4" type="video/mp4">
            Twoja przeglądarka nie obsługuje odtwarzacza wideo.
        </video>
        <div class="close-btn" onclick="closeVideo()">[ Zamknij ]</div>
    </div>

    <script>
        const modal = document.getElementById('video-modal');
        const video = document.getElementById('myVideo');

        function openVideo() {
            modal.style.display = 'flex';
            video.play();
        }

        function closeVideo() {
            modal.style.display = 'none';
            video.pause();
            video.currentTime = 0;
        }
    </script>
</body>

</html>
